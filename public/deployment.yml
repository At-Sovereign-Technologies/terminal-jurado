# NOTA DEMO: en producción cada terminal del puesto es una máquina física
# distinta con su propia IP/DNS. En esta demo solo levantamos UN sidecar
# (Terminal #1, puerto 8090), así que todos los votantes están asignados
# a esa terminal. Para probar Terminal #2 en demo se necesitaría arrancar
# un segundo SPA en puerto 5174 con sidecar en :8092.

puntos:
  - id: 1
    nombre: Puesto Avenida Chile
    latitud: 4.6486
    longitud: -74.0764
    activo: true
    secreto: "<jwt-del-punto-generado-por-el-servidor-electoral>"
    jurados:
      - id: 1
        nombre: Juliana Pérez
        documento: "2000000001"
        usuario: jperez
        hash: "$argon2id$..."
    terminales:
      - id: 1
        secreto: "<jwt-de-terminal-1>"
        clavePublica: "302a300506032b6570032100abcdef..."
        activo: true
        votantes:
          - id: 101
            nombre: Andrés Mora
            documento: "1010101010"
          - id: 102
            nombre: Sara Beltrán
            documento: "1020202020"
          - id: 103
            nombre: Camilo Salinas
            documento: "1030303030"
          - id: 104
            nombre: Diana Rojas
            documento: "1040404040"
      - id: 2
        secreto: "<jwt-de-terminal-2>"
        clavePublica: "302a300506032b65700321001122aabb..."
